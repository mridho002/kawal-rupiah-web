<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — Kawal Rupiah</title>
    <style>
      :root { color-scheme: dark; }
      * { margin: 0; box-sizing: border-box; }
      body {
        font-family: Inter, -apple-system, system-ui, sans-serif;
        background: #06080f;
        color: #f1f5f9;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        background-image: radial-gradient(900px circle at 50% 0%, rgba(16, 185, 129, 0.08), transparent 50%);
      }
      .card {
        max-width: 380px;
        background: #111827;
        border: 1px solid rgba(148, 163, 184, 0.12);
        border-radius: 20px;
        padding: 40px 28px;
      }
      .icon { width: 72px; height: 72px; margin: 0 auto 20px; }
      h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
      p { color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
      button {
        background: linear-gradient(135deg, #10b981, #059669);
        color: #022c22;
        border: 0;
        font-weight: 700;
        font-size: 14px;
        padding: 12px 24px;
        border-radius: 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="icon" src="/icons/icon.svg" alt="Kawal Rupiah" />
      <h1>Anda Sedang Offline</h1>
      <p>
        Koneksi internet tidak tersedia. Data laporan tersimpan aman secara lokal
        dan akan disinkronkan ke Hyperledger Fabric saat sinyal kembali.
      </p>
      <button onclick="location.reload()">Coba Lagi</button>
    </div>
  </body>
</html>
